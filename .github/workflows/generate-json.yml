name: Generate Portfolios JSON

on:
  push:
    branches: [main]
    paths: ['README.md']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate JSON
        run: node scripts/generate-json.mjs

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update portfolios.json [skip ci]'
          file_pattern: 'portfolios.json'
